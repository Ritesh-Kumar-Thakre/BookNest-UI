<div class="admin-container">
  <!-- SideNavBar -->
  <nav class="admin-sidebar">
    <div class="sidebar-header">
      <span class="material-symbols-outlined" style="font-size: 28px;">auto_stories</span>
      <div>
        <h1>BookNest</h1>
        <p>Admin Console</p>
      </div>
    </div>

    <div class="sidebar-links">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span class="material-symbols-outlined">dashboard</span>
        Dashboard
      </a>
      <a routerLink="/admin/books" routerLinkActive="active">
        <span class="material-symbols-outlined">menu_book</span>
        Book Management
      </a>
      <a routerLink="/admin/verification" routerLinkActive="active">
        <span class="material-symbols-outlined">fact_check</span>
        Verification
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active">
        <span class="material-symbols-outlined">shopping_cart</span>
        Orders
      </a>
      <a routerLink="/admin/users" routerLinkActive="active">
        <span class="material-symbols-outlined">group</span>
        Users
      </a>
    </div>

    <div class="sidebar-footer">
      <a (click)="onLogout()" class="logout-btn">
        <span class="material-symbols-outlined">logout</span>
        Logout
      </a>
      <a routerLink="/" class="back-btn" style="margin-top: 8px;">
        <span class="material-symbols-outlined">storefront</span>
        Storefront
      </a>
    </div>
  </nav>

  <!-- Main Content Wrapper -->
  <div class="admin-main">
    <!-- TopAppBar -->
    <header class="admin-header">
      <div class="search-bar">
        <!-- We can add search functionality later -->
      </div>
      <div class="header-actions">
        <button class="icon-btn">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="divider"></div>
        <div class="admin-profile">
          <div class="avatar">A</div>
          <div class="info">
            <p class="name">Admin User</p>
            <p class="role">Superadmin</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Canvas -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
