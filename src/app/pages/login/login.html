<div class="auth-page"><div class="auth-card card"><div class="auth-header"><span class="material-symbols-outlined" style="font-size:40px;color:var(--secondary-container)">menu_book</span><h1 class="headline-md">Welcome Back</h1><p class="body-md" style="color: rgba(255, 255, 255, 0.75); font-size: 15px;">Sign in to your BookNest account</p></div><form (ngSubmit)="onLogin()" class="auth-form"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" [(ngModel)]="email" name="email" placeholder="you&#64;example.com" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" [(ngModel)]="password" name="password" placeholder="••••••••" required></div>@if (error) { <p class="form-error">{{ error }}</p> }<button type="submit" class="btn btn-secondary" style="width:100%;padding:14px;font-size:16px;font-weight:700" [disabled]="loading">{{ loading ? 'Signing in...' : 'Sign In' }}</button></form><p class="auth-footer">Don't have an account? <a routerLink="/register">Create one</a></p></div></div>
