<div class="container section"><h1 class="headline-lg" style="margin-bottom: 24px;">Search Results for "{{ query }}"</h1><div class="book-grid">@for (book of results; track book.bookId) { <a [routerLink]="['/books', book.bookId]" class="card book-card"><div class="book-cover">@if (book.coverImageUrl) { <img [src]="book.coverImageUrl" [alt]="book.title" loading="lazy" referrerpolicy="no-referrer"> } @else { <div class="cover-placeholder"><span class="material-symbols-outlined">book</span></div> }</div><div class="book-info"><h3 class="label-md">{{ book.title }}</h3><p class="label-sm" style="color:var(--on-surface-variant)">{{ book.author }}</p><span class="price">₹{{ book.price }}</span></div></a> }</div>@if (searched && results.length === 0) { <div class="empty-state"><span class="material-symbols-outlined" style="font-size:64px;color:var(--outline)">search_off</span><p class="body-lg">No results found</p></div> }</div>
